[server]
enableWebsocketCompression = false
enableXsrfProtection = false
fileWatcherType = "none"
folderWatchBlacklist = ["."]
headless = true
runOnSave = false
enableCORS = false

[browser]
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

[global]
developmentMode = false
logLevel = "error"
